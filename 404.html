<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina non trovata – Sartoria Tagliacuci Novara</title>
  <meta name="description" content="La pagina che cerchi non esiste. Torna alla home di Sartoria Tagliacuci a Novara." />
  <meta name="robots" content="noindex, follow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />

  <style>
    :root {
      --white: #ffffff;
      --dark: #40413B;
      --accent: #A83D58;
      --gray-soft: #f5f4f0;
      --gray-mid: #e8e6e0;
      --gray-text: #888880;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Jost', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--gray-soft);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      animation: fadeUp 0.8s ease forwards;
    }

    .error-num {
      font-family: var(--font-display);
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 300;
      color: var(--gray-mid);
      line-height: 1;
      user-select: none;
    }

    .error-icon {
      font-size: 2rem;
      margin: 1rem 0;
      color: var(--accent);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 300;
      color: var(--dark);
      line-height: 1.2;
    }
    h1 em { font-style: italic; color: var(--accent); }

    .divider {
      width: 50px;
      height: 2px;
      background: var(--accent);
      margin: 1.5rem auto;
    }

    p {
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--gray-text);
    }

    .btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2.5rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--dark);
      color: var(--white);
      padding: 0.9rem 2rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: 2px solid var(--dark);
      transition: all 0.25s;
    }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); }

    .btn-outline {
      background: transparent;
      color: var(--dark);
      padding: 0.9rem 2rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: 2px solid var(--gray-mid);
      transition: all 0.25s;
    }
    .btn-outline:hover { border-color: var(--dark); }

    .logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: 0.05em;
      text-decoration: none;
      display: block;
      margin-bottom: 3rem;
    }
    .logo span { color: var(--accent); }

    .footer-note {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: var(--gray-text);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      body { padding: 1.5rem; }
      .error-num { font-size: clamp(5rem, 22vw, 7rem); }
      h1 { font-size: clamp(1.5rem, 7vw, 2rem); }
      .btns { flex-direction: column; align-items: center; }
      .btn-primary, .btn-outline {
        width: 100%;
        max-width: 280px;
        text-align: center;
        padding: 0.85rem 1.5rem;
      }
      .logo { margin-bottom: 2rem; }
    }

    @media (max-width: 380px) {
      .error-num { font-size: 5rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">Sartoria <span>Tagliacuci</span></a>

    <div class="error-num">404</div>
    <div class="error-icon">✂</div>

    <h1>Questa pagina<br>non esiste <em>ancora</em></h1>
    <div class="divider"></div>
    <p>Forse hai seguito un link sbagliato, oppure la pagina è stata spostata.<br>
    Torna alla nostra home o contattaci direttamente.</p>

    <div class="btns">
      <a href="/" class="btn-primary">Torna alla Home</a>
      <a href="/#contatti" class="btn-outline">Contattaci</a>
    </div>

    <p class="footer-note">
      Sartoria Tagliacuci — Via Gnifetti 13B, Novara
    </p>
  </div>
</body>
</html>
